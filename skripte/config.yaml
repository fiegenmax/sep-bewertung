# Konfiguration fuer die automatische SEP-Bewertung
#
# Schwellen pro Kriterium - hier kannst du die Strenge anpassen, ohne Code zu aendern.
# Die LLM-Bewertung ist optional. Wenn anthropic_api_key leer ist, wird sie deaktiviert
# und das Skript faellt auf die rein heuristische Bewertung zurueck.

llm:
  enabled: true
  # API-Key in .env: ANTHROPIC_API_KEY=sk-ant-...
  # (Hier nichts eintragen - kommt aus .env)
  model: claude-haiku-4-5-20251001
  max_tokens: 400
  # Cache-TTL in Tagen - LLM-Antworten werden gecached, um Kosten zu sparen
  cache_ttl_days: 7
  # Globaler Default fuer die User-Stories-Stichprobe (von llm_sampling.user_stories_count
  # ueberschrieben, falls dort gesetzt). Siehe llm_sampling: unten fuer alle Knoepfe.
  sample_size: 5
  # Sampling-Temperatur fuer reproduzierbare Scores (0 = deterministisch)
  temperature: 0

# ----------------------------------------------------------------------------
# Stichproben-Groessen und Laengen-Limits ALLER LLM-Zweitmeinungen an EINEM Ort.
# Hier schnell justieren, wie viel Datengrundlage jeder LLM-Call bekommt
# (Kosten/Granularitaet). Alle Defaults == bisheriges Verhalten.
#   *_count / *_files / *_pairs = Anzahl Items, die ans LLM gehen
#   *_chars                     = max. Zeichen pro Item (laengeres wird gekuerzt)
# ----------------------------------------------------------------------------
llm_sampling:
  # User Stories (Qualitaets-Check, Haiku)
  user_stories_count: 5
  user_stories_chars: 600
  # Commit-Messages (Substanz-Check, Haiku)
  commit_messages_count: 20
  # Wiki-/Meeting-Protokolle (Haiku)
  meeting_pages_count: 3
  meeting_pages_chars: 1500
  # Release-Notes (Substanz + Notes-vs-Commits, Haiku)
  release_notes_chars: 3000
  release_commits_count: 50
  # Code-Kommentare (Haiku)
  code_docs_files: 3
  code_docs_chars: 1200
  # Test-Dateien (Haiku) - groessen-/sprachgewichtete Stichprobe
  tests_files: 6
  tests_chars: 4000
  # Issue <-> Code: Story/MR-Diff-Abgleich (Sonnet, teurer -> sparsam halten)
  issue_vs_code_pairs: 4
  issue_vs_code_files: 8
  issue_vs_code_diff_chars: 1500
  issue_vs_code_total_chars: 6000
  issue_vs_code_story_chars: 1500
  # Branching-Workflow (Haiku)
  branching_branches_count: 40
  branching_mrs_count: 30
  # Code-Review-Substanz (Haiku)
  code_reviews_scan_count: 20    # wie viele MRs nach Review-Notes durchsucht werden
  code_reviews_sample_count: 5   # wie viele Review-Kommentare ans LLM gehen
  code_reviews_chars: 400
  # Sanity-Check der Gesamtbewertung (Haiku)
  sanity_reason_chars: 400

# Schwellen pro Kriterium
thresholds:

  user_stories:
    # Anteil mit Akzeptanzkriterien und User-Story-Format fuer volle Punktzahl
    full_score_ratio: 0.85
    # Anteil fuer 2 Punkte (Maengel)
    partial_score_ratio: 0.5
    # Mindestanzahl Stories fuer "Grobe Maengel" (1 Punkt)
    min_stories_for_one: 5

  commit_messages:
    min_avg_length: 25
    max_trivial_ratio: 0.15
    max_very_short_ratio: 0.10

  meetings:
    min_substantial_pages: 2
    min_text_length_for_substantial: 150

  release_changelog:
    min_description_chars: 200

  epics:
    min_epics: 3
    min_linked_stories: 5

  code_docs:
    min_top_readme_chars: 500
    min_subreadme_chars: 1000
    wiki_pages_for_one_point: 3
    wiki_pages_for_two_points: 8
    min_inline_comment_ratio: 0.05

  tests:
    files_for_first_point: 5
    files_for_second_point: 15
    substantive_for_third: 5
    methods_for_fourth: 30
    substantive_for_fifth: 3
    big_substantive_for_sixth: 10
    big_methods_for_seventh: 50
    big_substantive_for_seventh: 8

  release_executable:
    min_release_notes_chars: 500

  sprint_goals:
    min_closed_ratio: 0.5
    min_must_closed_ratio: 0.6

  work_scope:
    # Arbeitsumfang wird PRO KOPF bewertet (Gesamt-Commits/LOC / Teamgroesse).
    # normalize_by steuert den Teiler:
    #   "measured" (Default): real gemessene aktive Commit-Autoren (per E-Mail
    #       dedupliziert, Tutoren/Staff ausgefiltert), GEKLAMMERT auf
    #       [team_size_min, team_size_max]. Spiegelt die echte Teamgroesse wider,
    #       die Klammer verhindert den 1-Personen-Exploit (riesige Pro-Kopf-Werte).
    #   "fixed": feste assumed_active_authors (altes Verhalten).
    normalize_by: measured
    team_size_min: 5      # untere Klammer fuer "measured" (Trittbrettfahrer-Schutz)
    team_size_max: 8      # obere Klammer fuer "measured"
    # Teiler im Modus "fixed" (5-6 aktive Autoren angenommen, 6 = oberer Rand).
    assumed_active_authors: 6
    # Aktive Committer auf einer Staff-Domain (uni-due.de, NICHT stud.uni-due.de)
    # werden als Lehrpersonal ausgefiltert. Ab dieser Commit-Zahl werden sie aber
    # im Reason-Text zur manuellen Pruefung markiert (evtl. falsch konfigurierte
    # Studis, die mit der Uni- statt der Studi-Mail committen).
    staff_flag_min_commits: 20
    # Absoluter Boden: quasi leeres Repo -> 0 (teamgroessen-unabhaengig).
    zero_commits: 20
    zero_loc: 1000
    # Pro-Kopf-Schwellen (bei 6 angenommenen Autoren). Kalibriert auf SS26:
    # schwaechstes Team ~35 Commits/Kopf & ~1400 LOC/Kopf, staerkstes ~106 & ~3900.
    five_commits_per_dev: 15
    five_loc_per_dev: 800
    ten_commits_per_dev: 40
    ten_loc_per_dev: 2000

  gitlab_usage:
    min_label_ratio_full: 0.85
    min_assignee_ratio_full: 0.7
    min_closed_ratio_full: 0.5
    min_label_ratio_partial: 0.5

  branching:
    min_merged_mrs: 10
    min_non_main_branches: 3
    max_direct_pushes_to_main: 15

  code_reviews:
    min_approval_ratio_strong: 0.5
    min_any_signal_ratio_strong: 0.7
    min_any_signal_ratio_weak: 0.4

  repo_hygiene:
    max_build_artifacts: 5
    max_ide_configs: 3
    large_binary_mb: 5
    max_todos: 20

# Parallelisierung in run_all (Teams sind unabhaengig)
run:
  team_workers: 4

# Tutor-Usernamen (Substring-Match) - werden bei der Team-Groesse nicht mitgezaehlt
tutors:
  - vogelsang
  - metzger

# E-Mail-Domains zur Tutor-/Studi-Unterscheidung bei der Commit-Autoren-Zaehlung.
# Wer auf einer staff-Domain committet, aber NICHT auf einer student-(Sub-)Domain,
# gilt als Lehrpersonal (Tutor/Betreuer) und zaehlt nicht als Studi-Autor mit.
# Beispiel UDE: alexander.korn@uni-due.de = Personal, x@stud.uni-due.de = Studi.
staff_email_domains:
  - uni-due.de
student_email_domains:
  - stud.uni-due.de

# Verzeichnisse, die bei LOC/Test-Scans ausgeschlossen werden
vendor_dirs:
  - node_modules
  - .git
  - dist
  - build
  - target
  - out
  - .gradle
  - .idea
  - vendor
  - venv
  - .venv
  - __pycache__

# Sprach-Registry fuer LOC-/Test-/Struktur-Erkennung (Default deckt Java/TS/Python/Go/Kotlin/Web)
languages:
  java:
    source_ext: [".java"]
    test_globs: ["**/*Test*.java", "**/*Tests.java", "**/*IT.java"]
    test_markers: ["@Test", "@ParameterizedTest"]
    comment_markers: ["//", "*", "/*"]
  typescript:
    source_ext: [".ts"]
    test_globs: ["**/*.spec.ts", "**/*.test.ts", "**/*.spec.tsx", "**/*.test.tsx"]
    test_markers: ["it(", "test(", "expect("]
    comment_markers: ["//", "*", "/*"]
  python:
    source_ext: [".py"]
    test_globs: ["**/test_*.py", "**/*_test.py"]
    test_markers: ["def test_", "assert ", "self.assert"]
    comment_markers: ["#"]
  go:
    source_ext: [".go"]
    test_globs: ["**/*_test.go"]
    test_markers: ["func Test", "func Benchmark"]
    comment_markers: ["//"]
  kotlin:
    source_ext: [".kt"]
    test_globs: ["**/*Test.kt", "**/*Tests.kt"]
    test_markers: ["@Test"]
    comment_markers: ["//", "*", "/*"]
  web:
    source_ext: [".html", ".css"]
    test_globs: []
    test_markers: []
    comment_markers: []
